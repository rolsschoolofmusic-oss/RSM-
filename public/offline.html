<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>ROL's Plus — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      min-height: 100dvh;
      background: #0f172a;
      color: #f1f5f9;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 340px; }
    .logo {
      width: 72px; height: 72px;
      background: #1e293b;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      border: 2px solid #334155;
    }
    .logo-text { font-size: 24px; font-weight: 800; color: #f59e0b; letter-spacing: -1px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p  { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 28px; }
    button {
      background: #f59e0b;
      color: #0f172a;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span class="logo-text">R+</span></div>
    <h1>You're offline</h1>
    <p>ROL's Plus needs a connection to load your data.<br>Check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
